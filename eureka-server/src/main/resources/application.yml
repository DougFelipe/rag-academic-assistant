# eureka-server Bootstrap Configuration
# All runtime configuration is centralized in config-repo

server:
  port: 8761

spring:
  application:
    name: eureka-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      enabled: true
      fail-fast: true
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      retry:
        max-attempts: 10
        initial-interval: 2000
        max-interval: 3000
