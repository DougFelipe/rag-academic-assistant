services:
  # =====================================
  # Config Server - Must start first
  # =====================================
  config-server:
    container_name: distribuida3-config-server
    build:
      context: .
      dockerfile: config-server/Dockerfile
    image: distribuida3/config-server:latest
    ports:
      - "8888:8888"
    networks:
      - microservices-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - ./config-repo:/config-repo:rw
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    labels:
      - "service.type=infrastructure"
      - "service.name=config-server"

networks:
  microservices-network:
    name: distribuida3-network
    driver: bridge
