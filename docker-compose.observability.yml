services:
  # =====================================
  # Prometheus - Metrics Collection
  # =====================================
  prometheus:
    container_name: distribuida3-prometheus
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    networks:
      - microservices-network
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    labels:
      - "service.type=observability"
      - "service.name=prometheus"

  # =====================================
  # Grafana - Metrics Visualization
  # =====================================
  grafana:
    container_name: distribuida3-grafana
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    networks:
      - microservices-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    labels:
      - "service.type=observability"
      - "service.name=grafana"

  # =====================================
  # Zipkin - Distributed Tracing (Optional)
  # =====================================
  zipkin:
    container_name: distribuida3-zipkin
    image: openzipkin/zipkin:2.24
    ports:
      - "9411:9411"
    networks:
      - microservices-network
    environment:
      - STORAGE_TYPE=mem
      - JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9411/health" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    labels:
      - "service.type=observability"
      - "service.name=zipkin"

networks:
  microservices-network:
    name: distribuida3-network
    external: true

volumes:
  prometheus-data:
    name: distribuida3-prometheus-data
  grafana-data:
    name: distribuida3-grafana-data
