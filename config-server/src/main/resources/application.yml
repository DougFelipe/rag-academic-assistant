# Config Server Bootstrap Configuration
# This is the LOCAL configuration that Config Server uses to start up
# It cannot depend on itself for configuration (bootstrap problem)

server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        # Use native filesystem - simpler and more reliable for monorepo
        native:
          search-locations: file:${user.dir}/../config-repo
        # Git configuration (disabled by default)
        git:
          uri: file:${user.dir}/../config-repo
          default-label: main
          clone-on-start: false

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
    org.springframework.boot: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
