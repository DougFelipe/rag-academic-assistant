# Config Server Docker Profile
# Used when running in Docker containers

spring:
  cloud:
    config:
      server:
        git:
          uri: file:/config-repo
          # In Docker, config-repo will be mounted as volume
        native:
          search-locations: file:/config-repo

# Docker-specific logging
logging:
  level:
    root: INFO
    org.springframework.cloud.config: INFO

# Health check configuration for Docker
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

server:
  shutdown: graceful
