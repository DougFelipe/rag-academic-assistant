# AI Service Production Configuration

server:
  port: 8082

spring:
  application:
    name: ai-service

  # Spring AI Configuration (Production)
  ai:
    enabled: ${AI_ENABLED:true}
    
    # Ollama Configuration (Primary)
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
      chat:
        enabled: true
        options:
          model: ${AI_MODEL:minimax-m2:cloud}
          temperature: 0.7
          timeout: 20s  #
          num-ctx: 2048  
    
    # OpenAI Configuration (Disabled - Fallback only)
    openai:
      api-key: sk-proj-fake-key-disabled
      base-url: http://localhost:9999
      chat:
        enabled: false
        options:
          model: gpt-3.5-turbo
          temperature: 0.7
          max-tokens: 800
          top-p: 1.0

# Resilience4j for AI Service (Production)
resilience4j:
  circuitbreaker:
    instances:
      aiClient:
        register-health-indicator: true
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50  
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 11s  
        slow-call-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 5
      aiProcessing:
        register-health-indicator: true
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 50

  retry:
    instances:
      aiClient:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.util.concurrent.TimeoutException

  timelimiter:
    instances:
      aiClient:
        timeout-duration: 20s  
        cancel-running-future: true
      aiProcessing:
        timeout-duration: 25s  #

  ratelimiter:
    instances:
      aiApi:
        limit-for-period: 15  # Reduced for cost control
        limit-refresh-period: 1s
        timeout-duration: 10s

  bulkhead:
    instances:
      aiProcessing:
        maxConcurrentCalls: 5
        maxWaitDuration: 10s

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    br.ufrn.distribuida.ai: DEBUG
    org.springframework.ai.ollama: DEBUG  
    org.springframework.web.client: DEBUG  
    org.springframework.http.client: TRACE  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
