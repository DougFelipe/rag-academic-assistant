# Function Service - Docker Profile

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: function-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    "[br.ufrn.distribuida.function]": INFO
