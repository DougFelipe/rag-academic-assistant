# Gateway Service Configuration

server:
  port: 8080

spring:
  application:
    name: gateway-service


demo:
  message: "Versão 1.0"
  feature-enabled: true
  max-requests: 1000

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      
        pool:
          max-connections: 100  
          max-idle-time: 30s 
        connect-timeout: 5000 
        response-timeout: 35000  
      
      routes:
        # Health Check Routes (for monitoring)
        - id: ai-service-health
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/health
        
        - id: function-service-health
          uri: lb://function-service
          predicates:
            - Path=/function/health
        
        - id: orchestrator-service-health
          uri: lb://orchestrator-service
          predicates:
            - Path=/api/orchestrator/health
        
        - id: mcp-external-service-health
          uri: lb://mcp-external-service
          predicates:
            - Path=/api/mcp-external/health
        
        # Orchestrator Service Routes
        - id: orchestrator-service
          uri: lb://orchestrator-service
          predicates:
            - Path=/api/orchestrator/**
          filters:
            - name: CircuitBreaker
              args:
                name: orchestratorCircuitBreaker
        
        # AI Service Routes
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - name: CircuitBreaker
              args:
                name: aiCircuitBreaker
        
        # Function Service Routes  
        - id: function-service
          uri: lb://function-service
          predicates:
            - Path=/function/**
          filters:
            - name: CircuitBreaker
              args:
                name: functionCircuitBreaker

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Type
            maxAge: 3600

resilience4j:
  circuitbreaker:
    instances:
      orchestratorCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 45  
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 20000  #  20s = slow call
        slowCallRateThreshold: 50  # 50% slow calls = abrir
      aiCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
      functionCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  ratelimiter:
    instances:
      default:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,refresh
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
